name: Daily Task Job

on:
  schedule:
    - cron: '0 2 * * *'  # 每天北京时间 10:00 (UTC 02:00)
  workflow_dispatch:
    inputs:
      count:
        description: '本次手动运行注册数量'
        required: false
        default: '40'

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install curl_cffi requests

      - name: Run registration
        env:
          REG_COUNT: ${{ github.event.inputs.count || '40' }}
          PROXY: http://customer-q9oqTxb2u3-cc-US-sessid-1774029610_10000:x0vgOxzwxlnZIIb@gate-sg.ipfoxy.io:58688
          USE_CLOUDFLARE_EMAIL: true
          CLOUDFLARE_EMAIL_API: https://mail-api.hznan0629.cloud
        run: |
          mkdir -p codex
          for i in $(seq 1 $REG_COUNT); do
            echo "========== 第 $i/$REG_COUNT 次注册 =========="
            python task_runner.py --once || true
            if [ "$i" -lt "$REG_COUNT" ]; then
              SLEEP=$((RANDOM % 20 + 10))
              echo "[*] 等待 ${SLEEP}s..."
              sleep $SLEEP
            fi
          done

      - name: Upload to server
        if: always()
        env:
          API_URL: ${{ secrets.API_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          for file in codex/*.json; do
            [ -f "$file" ] || continue
            curl -X POST "$API_URL/webhook/github" \
              -H "Content-Type: application/json" \
              -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
              -d @"$file" || echo "Failed: $file"
          done

      - name: Notify Feishu
        if: always()
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_ID: ${{ secrets.FEISHU_USER_ID }}
        run: |
          COUNT=$(find codex -name '*.json' 2>/dev/null | wc -l)
          
          # 获取 access token
          TOKEN=$(curl -s -X POST "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$FEISHU_APP_ID\",\"app_secret\":\"$FEISHU_APP_SECRET\"}" \
            | grep -o '"tenant_access_token":"[^"]*"' | cut -d'"' -f4)
          
          if [ "$COUNT" -gt 0 ]; then
            TEXT="📦 注册任务完成\n✅ 本次产出: ${COUNT} 个账户\n🔗 Run #${{ github.run_number }}"
          else
            TEXT="❌ 注册任务完成\n本次无产出\n🔗 Run #${{ github.run_number }}"
          fi
          
          # 发送消息
          curl -s -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"receive_id\":\"$FEISHU_USER_ID\",\"msg_type\":\"text\",\"content\":\"{\\\"text\\\":\\\"$TEXT\\\"}\"}" || true
